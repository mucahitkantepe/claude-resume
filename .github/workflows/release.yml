name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            features: accelerate
          - target: aarch64-apple-darwin
            os: macos-latest
            features: metal,accelerate
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            features: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build --release --target ${{ matrix.target }} --features ${{ matrix.features }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../claude-resume-${{ matrix.target }}.tar.gz claude-resume
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-resume-${{ matrix.target }}
          path: claude-resume-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-resume-x86_64-apple-darwin/claude-resume-x86_64-apple-darwin.tar.gz
            claude-resume-aarch64-apple-darwin/claude-resume-aarch64-apple-darwin.tar.gz
            claude-resume-x86_64-unknown-linux-gnu/claude-resume-x86_64-unknown-linux-gnu.tar.gz
            claude-resume-aarch64-unknown-linux-gnu/claude-resume-aarch64-unknown-linux-gnu.tar.gz
          generate_release_notes: true
